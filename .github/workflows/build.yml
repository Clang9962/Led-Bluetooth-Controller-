name: Build iOS Unsigned IPA

on:
  workflow_dispatch: # Allows you to trigger the build manually from your phone

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Compile Native iOS Code Without Signing
        run: |
          # 1. Rebuild missing or broken native iOS directory configurations cleanly
          flutter create . --platforms=ios
          
          # 2. Map all Bluetooth and hardware plugins into the new iOS folder
          flutter pub get
          
          # 3. Initialize build paths without code signatures
          flutter build ios --release --no-codesign --config-only
          
          # 4. Force the native Xcode compiler to completely skip profile validation checks
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            -allowProvisioningDeviceRegistration

      - name: Package Payload to IPA
        run: |
          # Create the standardized directory format that iOS expects
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r led_controller.ipa Payload

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        
