name: Build iOS Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Arrange Folders and Compile
        run: |
          # 1. Rebuild base template container cleanly
          flutter create --platforms=ios --org com.example clean_build_holder
          cd clean_build_holder
          
          # 2. Add required architecture package dependencies
          flutter pub add flutter_blue_plus shared_preferences provider
          
          # 3. Mirror your project files into their matching folder tracks
          mkdir -p lib/constants
          mkdir -p lib/providers
          
          cp ../lib/xc610_uuids.dart lib/constants/xc610_uuids.dart
          cp ../lib/ble_provider.dart lib/providers/ble_provider.dart
          cp ../lib/home_screen.dart lib/home_screen.dart
          cp ../lib/device_screen.dart lib/device_screen.dart
          cp ../lib/main.dart lib/main.dart
          
          # 4. Fetch packages and execute build layout
          flutter pub get
          flutter build ios --simulator --debug

      - name: Package Payload to IPA
        run: |
          mkdir -p Payload
          cp -r clean_build_holder/build/ios/iphonesimulator/Runner.app Payload/
          zip -r led_controller.ipa Payload

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa-file
          path: led_controller.ipa
