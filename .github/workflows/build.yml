name: Build iOS Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Set up CocoaPods Natively
        run: |
          sudo gem install cocoapods
          pod setup

      - name: Build App Asset Bundle
        run: |
          # 1. Pull down package architecture configuration
          flutter pub get
          
          # 2. Build for a simulator profile to strip development team profile requirements
          flutter build ios --simulator --debug

      - name: Package Payload to IPA
        run: |
          # Re-route the compiled app bundle into a clean, flat installer structure
          mkdir -p Payload
          cp -r build/ios/iphonesimulator/Runner.app Payload/
          zip -r led_controller.ipa Payload

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa-file
          path: led_controller.ipa
