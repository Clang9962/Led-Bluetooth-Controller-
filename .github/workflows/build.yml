name: Build iOS Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Rebuild Application Workspace Cleanly
        run: |
          # 1. Create a pristine new Flutter project environment in a sub-folder
          flutter create --platforms=ios --org com.example clean_build_holder
          
          # 2. Add the missing core package dependencies directly to the workspace structure
          cd clean_build_holder
          flutter pub add flutter_blue_plus shared_preferences provider
          
          # 3. Swap out the template lib files with your custom Bluetooth lib folder files
          rm -rf lib
          cp -r ../lib .
          
          # 4. Fetch packages to ensure everything matches smoothly
          flutter pub get
          
          # 5. Compile directly to an unsigned simulator binary architecture
          flutter build ios --simulator --debug

      - name: Package Payload to IPA
        run: |
          # Map the compiled application bundle files into a flat directory structure
          mkdir -p Payload
          cp -r clean_build_holder/build/ios/iphonesimulator/Runner.app Payload/
          zip -r led_controller.ipa Payload

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa-file
          path: led_controller.ipa
