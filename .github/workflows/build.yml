name: Build iOS Unsigned IPA

on:
  workflow_dispatch: # Allows you to trigger the build manually from your phone

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Compile Simulator Binary (Bypasses Signing)
        run: |
          # 1. Clean the environment cache safely
          flutter clean
          
          # 2. Force create fresh native deployment project layouts
          flutter create . --platforms=ios
          
          # 3. Pull required Bluetooth asset libraries down
          flutter pub get
          
          # 4. Compile directly to an unsigned simulator profile structure 
          flutter build ios --simulator --debug

      - name: Package Payload to IPA
        run: |
          # 1. Build an installer directory layout
          mkdir -p Payload
          
          # 2. Copy the fresh compiled machine-code bundle into the package path
          cp -r build/ios/iphonesimulator/Runner.app Payload/
          
          # 3. Zip the folder container to finalize the flashable installer package
          zip -r led_controller.ipa Payload

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa-file
          path: led_controller.ipa
