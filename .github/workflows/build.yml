name: Build iOS Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Configure and Compile App Bundle
        run: |
          # 1. Reset build cache and rebuild template project files
          flutter clean
          flutter create . --platforms=ios
          flutter pub get
          
          # 2. Force the native project files to use iOS 13.0 as the minimum target version
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 12.0/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/deployment_target = '\''12.0'\''/deployment_target = '\''13.0'\''/g' ios/Podfile || true
          
          # 3. Build the simulator app package layout 
          flutter build ios --simulator --debug

      - name: Package Payload to IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphonesimulator/Runner.app Payload/
          zip -r led_controller.ipa Payload

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa-file
          path: led_controller.ipa
