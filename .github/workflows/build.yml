name: Build iOS Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Force Configure and Build iOS Directories
        run: |
          # 1. Force flutter create to cleanly generate ONLY the missing iOS directory
          # using your existing package identity parameters to prevent a crash
          flutter create . --platforms=ios --org com.example --project-name led_remote_app
          
          # 2. Re-fetch packages and link project dependencies 
          flutter pub get
          
          # 3. Build for a simulator profile to strip development team profile requirements
          flutter build ios --simulator --debug

      - name: Package Payload to IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphonesimulator/Runner.app Payload/
          zip -r led_controller.ipa Payload

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa-file
          path: led_controller.ipa
