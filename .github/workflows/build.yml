name: Export App Code For AI Analysis

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Combine All Code Files
        run: |
          echo "=== PROJECT ARCHITECTURE OVERVIEW ===" > complete_codebase.txt
          find lib -type f >> complete_codebase.txt
          echo "" >> complete_codebase.txt
          
          for file in $(find lib -type f \( -name "*.dart" -o -name "*.yaml" \)); do
            echo "========================================" >> complete_codebase.txt
            echo "FILE: $file" >> complete_codebase.txt
            echo "========================================" >> complete_codebase.txt
            cat "$file" >> complete_codebase.txt
            echo "" >> complete_codebase.txt
          done

      - name: Upload Complete Code Document
        uses: actions/upload-artifact@v4
        with:
          name: project-codebase-text
          path: complete_codebase.txt
