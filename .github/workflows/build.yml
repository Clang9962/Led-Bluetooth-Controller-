name: Build iOS Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Fix Code and Compile
        run: |
          # 1. Rebuild the base template container cleanly
          flutter create --platforms=ios --org com.example clean_build_holder
          cd clean_build_holder
          
          # 2. Add required package dependencies
          flutter pub add flutter_blue_plus shared_preferences provider
          
          # 3. Rebuild the structural subfolders expected by your imports
          mkdir -p lib/constants
          mkdir -p lib/providers
          
          # 4. Copy files into place
          cp ../lib/xc610_uuids.dart lib/constants/xc610_uuids.dart
          cp ../lib/home_screen.dart lib/home_screen.dart
          cp ../lib/device_screen.dart lib/device_screen.dart
          cp ../lib/main.dart lib/main.dart
          
          # 5. Read your ble_provider.dart and use a safe Python replacement to fix the semicolons
          python3 -c "
          with open('../lib/ble_provider.dart', 'r') as f:
              code = f.read()
          # Fix line 76
          code = code.replace(\"_addNotificationLog('Received: ' + value.map((e) => e.toRadixString(16)).join(' '))\", \"_addNotificationLog('Received: ' + value.map((e) => e.toRadixString(16)).join(' '));\")
          # Fix alternative syntax pattern if needed
          code = code.replace(\"join(' ')}\\\")\", \"join(' ')}');\")
          with open('lib/providers/ble_provider.dart', 'w') as f:
              f.write(code)
          " || cp ../lib/ble_provider.dart lib/providers/ble_provider.dart
          
          # Quick manual fix fallback just in case python missed it
          sed -i '' 's/_addNotificationLog.*join.*)[^;]$/&;/g' lib/providers/ble_provider.dart || true
          
          # 6. Fetch project packages and compile the simulator template
          flutter pub get
          flutter build ios --simulator --debug

      - name: Package Payload to IPA
        run: |
          mkdir -p Payload
          cp -r clean_build_holder/build/ios/iphonesimulator/Runner.app Payload/
          zip -r led_controller.ipa Payload

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa-file
          path: led_controller.ipa
