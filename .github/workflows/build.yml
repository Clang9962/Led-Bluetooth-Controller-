name: Build iOS Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Rebuild Application Workspace Cleanly
        run: |
          # 1. Create a pristine new Flutter project environment in a sub-folder
          flutter create --platforms=ios --org com.example clean_build_holder
          
          # 2. Swap out the template lib files with your custom Bluetooth lib folder files
          rm -rf clean_build_holder/lib
          cp -r lib clean_build_holder/lib
          
          # 3. Copy your project configuration specifications into the fresh environment
          cp pubspec.yaml clean_build_holder/pubspec.yaml
          
          # 4. Navigate into the compiler folder and retrieve dependencies
          cd clean_build_holder
          flutter pub get
          
          # 5. Compile directly to an unsigned simulator binary architecture to skip profiles
          flutter build ios --simulator --debug

      - name: Package Payload to IPA
        run: |
          # Map the compiled application bundle files into a flat directory structure
          mkdir -p Payload
          cp -r clean_build_holder/build/ios/iphonesimulator/Runner.app Payload/
          zip -r led_controller.ipa Payload

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa-file
          path: led_controller.ipa
