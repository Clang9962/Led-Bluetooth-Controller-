
name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # 1. Get code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 3. Check Flutter
      - name: Flutter doctor
        run: flutter doctor -v

      # 4. Get dependencies
      - name: Install dependencies
        run: flutter pub get

      # 5. Create iOS folder if missing
      - name: Generate iOS project
        run: flutter create .

      # 6. Build iOS (no signing)
      - name: Build iOS app
        run: flutter build ios --release --no-codesign

      # 7. Package IPA
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r app.ipa Payload

      # 8. Upload artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: app.ipa
