name: Build iOS Unsigned IPA

on:
  workflow_dispatch: # Allows you to trigger it manually from your phone

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Fetch Packages
        run: flutter pub get

      - name: Compile Native iOS Code Without Signing
        run: |
          # Initialize native project configurations without verifying code signatures
          flutter build ios --release --no-codesign --config-only
          
          # Manually force the underlying Xcode engine to bypass developer team verification
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            -allowProvisioningDeviceRegistration

      - name: Package Payload to IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r led_controller.ipa Payload

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa-file
          path: led_controller.ipa
